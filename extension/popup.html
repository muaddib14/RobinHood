<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body { font-family: monospace; width: 260px; padding: 12px; background: #0a1a0a; color: #d4ff7a; }
      label { display: block; margin-bottom: 6px; font-size: 12px; }
      input { width: 100%; box-sizing: border-box; padding: 6px; margin-bottom: 8px; background: #071207; color: #d4ff7a; border: 1px solid #3a5a3a; }
      button { width: 100%; padding: 6px; background: #d4ff7a; color: #0a1a0a; border: none; font-weight: bold; cursor: pointer; }
      #status { font-size: 11px; margin-top: 6px; opacity: 0.8; }
    </style>
  </head>
  <body>
    <label for="apiBaseUrl">Gotham API base URL</label>
    <input id="apiBaseUrl" type="text" placeholder="https://your-deploy.vercel.app" />
    <button id="save">Save</button>
    <div id="status"></div>
    <script src="popup.js"></script>
  </body>
</html>
